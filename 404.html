<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found | Anasi Marketing Ltd</title>
  <meta name="robots" content="noindex,nofollow">
  <style>
    :root {
      --bg1: #f6f7fb;
      --bg2: #ffffff;
      --ink: #182032;
      --muted: #596277;
      --brand: #1f7a8c;
      --brand-dark: #155764;
      --card: #ffffff;
      --line: #e7eaf1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Kumbh Sans", system-ui, -apple-system, Segoe UI, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top right, #ddebf0 0%, var(--bg1) 45%, var(--bg2) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .panel {
      width: min(740px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(24, 32, 50, 0.08);
    }

    .code {
      display: inline-block;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--brand-dark);
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 999px;
      padding: 10px 18px;
      font-weight: 600;
      border: 1px solid transparent;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover { transform: translateY(-1px); opacity: 0.95; }

    .btn-primary {
      background: var(--brand);
      color: #fff;
    }

    .btn-ghost {
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
    }

    .quick-links {
      margin-top: 18px;
      color: var(--muted);
      font-size: 15px;
    }

    .quick-links a {
      color: var(--brand-dark);
      text-decoration: none;
      margin-right: 12px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <main class="panel">
    <span class="code">ERROR 404</span>
    <h1>This page does not exist</h1>
    <p>The link may be outdated, misspelled, or moved. Use one of the main pages below to continue browsing Anasi Marketing.</p>

    <div class="actions">
      <a class="btn btn-primary" href="/home">Go To Home</a>
      <a class="btn btn-ghost" href="/contact">Contact Us</a>
    </div>

    <div class="quick-links">
      Quick links:
      <a href="/about">About</a>
      <a href="/services">Services</a>
      <a href="/blog">Blog</a>
      <a href="/faq">FAQ</a>
    </div>
  </main>
</body>
</html>
